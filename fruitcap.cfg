[capture]
# Resolution: 4k, 1080p, 720p (or custom WIDTHxHEIGHT e.g. 2560x1440)
resolution = 4k

# Video codec: h264, h265, prores, prores_proxy, prores_lt, prores_hq
# ProRes forces 10-bit 4:2:2, MOV container, and PCM audio automatically
codec = h264

# Container format: mp4, mov, or auto (auto = mov for ProRes, mp4 otherwise)
# container = auto

# Bit depth: 8 or 10 (10-bit requires h265 or prores)
bit_depth = 8

# Chroma subsampling: 420 or 422
chroma = 420

# Bitrate in bits per second, or shorthand (e.g. 80m, 500k)
# Ignored for ProRes (quality-based codec)
bitrate = 80000000

# Color space: bt709, bt2020, hlg, pq
# color_space = bt709

# Frame rate: 30, 29.97, 25, 24, 23.976, or any supported value (default: device native)
# fps = 29.97

# Discard late frames: yes or no (no = never drop frames)
discard_late_frames = no

# Output file path (supports %d for date, %t for time tokens)
output = capture-%d-%t.mp4

[audio]
# Enable audio capture: yes or no
capture = yes

# Audio codec: aac, alac (lossless), or pcm (uncompressed 24-bit)
# ProRes auto-selects pcm unless overridden
codec = aac

# AAC bitrate in bits per second (ignored for alac/pcm)
bitrate = 256000

# Sample rate in Hz
sample_rate = 48000

# Number of audio channels
channels = 1
