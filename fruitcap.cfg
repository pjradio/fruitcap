[capture]
# Resolution: 4k, 1080p, 720p (or custom WIDTHxHEIGHT e.g. 2560x1440)
resolution = 4k

# Video codec: h264 or h265
codec = h265

# Bit depth: 8 or 10 (10-bit requires h265)
bit_depth = 8

# Chroma subsampling: 420 or 422
chroma = 420

# Bitrate in bits per second (e.g., 50000000 = 50 Mbps)
bitrate = 150000000

# Discard late frames: yes or no (no = never drop frames)
discard_late_frames = no

# Output file path
output = capture.mp4

[audio]
# Enable audio capture: yes or no
capture = yes

# Audio codec: aac or alac (alac = lossless)
codec = aac

# AAC bitrate in bits per second (ignored for alac)
bitrate = 256000

# Sample rate in Hz
sample_rate = 48000

# Number of audio channels
channels = 1
